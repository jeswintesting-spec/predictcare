{% extends 'base.html' %}

{% block title %}Add New Staff - PredictCare{% endblock %}

{% block header_title %}Add New Staff Member{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
    <div class="p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Staff Registration</h2>
                <p class="text-slate-500">Register a new doctor or nurse to the system.</p>
            </div>
            <a href="{% url 'admin_dashboard' %}" class="text-slate-500 hover:text-slate-700 text-sm font-semibold">
                &larr; Back to Dashboard
            </a>
        </div>

        <form method="POST" action="{% url 'add_staff' %}" class="space-y-6">
            {% csrf_token %}

            <!-- Type Selection -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Staff Role</label>
                    <div class="flex gap-4 p-1 bg-slate-100 rounded-lg">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="doctor" class="peer sr-only" checked
                                onchange="toggleFields()">
                            <div
                                class="text-center py-2 rounded-md text-sm font-bold text-slate-500 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm transition-all">
                                Doctor
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="nurse" class="peer sr-only"
                                onchange="toggleFields()">
                            <div
                                class="text-center py-2 rounded-md text-sm font-bold text-slate-500 peer-checked:bg-white peer-checked:text-pink-600 peer-checked:shadow-sm transition-all">
                                Nurse
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Department</label>
                    <select name="department" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                        <option value="">-- Select Department --</option>
                        {% for dept in departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Personal Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                    <input type="text" name="name" required placeholder="e.g. Dr. Sarah Connor"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Gender</label>
                    <select name="gender" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                    <input type="email" name="email" required placeholder="name@predictcare.com"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                    <input type="tel" name="phone" required placeholder="+91 9999999999"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                </div>
            </div>

            <!-- Professional Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Qualifications</label>
                    <input type="text" name="qualifications" required placeholder="e.g. MBBS, MD"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                </div>
                <div id="specDiv">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Specialization</label>
                    <input type="text" name="specialization" id="specInput" placeholder="e.g. Cardiologist"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
                <a href="{% url 'admin_dashboard' %}"
                    class="px-6 py-2.5 rounded-lg border border-slate-300 text-slate-600 font-bold hover:bg-slate-50 transition">
                    Cancel
                </a>
                <button type="submit"
                    class="px-8 py-2.5 rounded-lg bg-blue-600 text-white font-bold shadow-lg hover:bg-blue-700 hover:shadow-xl transition transform active:scale-95">
                    Create Account
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleFields() {
        const role = document.querySelector('input[name="role"]:checked').value;
        const specDiv = document.getElementById('specDiv');
        const specInput = document.getElementById('specInput');

        if (role === 'doctor') {
            specDiv.style.opacity = '1';
            specDiv.style.pointerEvents = 'auto';
            specInput.required = true;
        } else {
            specDiv.style.opacity = '0.5';
            specDiv.style.pointerEvents = 'none';
            specInput.required = false;
            specInput.value = "";
        }
    }
    // Init
    toggleFields();
</script>
{% endblock %}
