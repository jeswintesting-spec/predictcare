{% extends 'base.html' %}

{% block title %}Edit Medicine - Pharmacy{% endblock %}

{% block header_title %}Edit Medicine{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-sm border border-gray-200">
    <div class="mb-6 pb-4 border-b border-gray-100 flex justify-between items-center">
        <div>
            <h3 class="text-xl font-bold text-gray-800">Update Inventory Item</h3>
            <p class="text-sm text-gray-500">Modify details for <span class="font-medium text-gray-700">{{ medicine.name
                    }}</span>.</p>
        </div>
        <span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded font-mono">ID: {{ medicine.id }}</span>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Medicine Name</label>
            <input type="text" name="name" value="{{ medicine.name }}" required
                class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow">
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Price (₹)</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-400">₹</span>
                    <input type="number" step="0.01" name="price" value="{{ medicine.price }}" required
                        class="w-full border border-gray-300 pl-8 pr-4 py-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Stock Qty</label>
                <input type="number" name="stock" value="{{ medicine.stock_quantity }}" required
                    class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Min Stock Alert</label>
                <input type="number" name="min_stock" value="{{ medicine.min_stock_level }}" required
                    class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow">
            </div>
            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase mb-2">Expiry Date</label>
                <input type="date" name="expiry" value="{{ medicine.expiry_date|date:'Y-m-d' }}" required
                    class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow">
            </div>
        </div>

        <div class="flex items-center gap-4 pt-4">
            <button type="submit"
                class="flex-grow bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm">
                Save Changes
            </button>
            <a href="{% url 'pharmacy_inventory' %}"
                class="px-6 py-3 border border-gray-300 text-gray-600 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
